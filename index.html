<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>시대학원 조교관리</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a2744">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="조교관리">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800&display=swap');
:root {
  --navy: #1a2744;
  --navy-light: #2a3d62;
  --blue: #4299e1;
  --green: #38a169;
  --orange: #ed8936;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(160deg, var(--navy) 0%, var(--navy-light) 40%, #1e3a5f 100%);
  min-height: 100vh; color: white;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}
.logo { font-size: 48px; margin-bottom: 8px; }
h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.sub { font-size: 13px; opacity: 0.6; margin-bottom: 36px; }
.cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 380px; }
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px; padding: 24px 22px;
  text-decoration: none; color: white;
  transition: all 0.25s; cursor: pointer;
  display: flex; align-items: center; gap: 16px;
  backdrop-filter: blur(10px);
}
.card:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
.card:active { transform: scale(0.98); }
.card-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.card-icon.journal { background: linear-gradient(135deg, var(--blue), #2b6cb0); }
.card-icon.salary { background: linear-gradient(135deg, var(--green), #276749); }
.card-icon.sheet { background: linear-gradient(135deg, var(--orange), #c05621); }
.card-text h2 { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.card-text p { font-size: 12px; opacity: 0.6; line-height: 1.4; }
.card-arrow { margin-left: auto; opacity: 0.4; font-size: 18px; }

.install-banner {
  margin-top: 30px; padding: 16px 20px;
  background: rgba(66,153,225,0.15); border: 1px solid rgba(66,153,225,0.3);
  border-radius: 12px; text-align: center; width: 100%; max-width: 380px;
}
.install-banner p { font-size: 13px; opacity: 0.8; margin-bottom: 10px; }
.install-btn {
  padding: 10px 24px; border: none; border-radius: 10px;
  background: var(--blue); color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
  display: none;
}
.install-btn:hover { background: #3182ce; }
.install-guide {
  margin-top: 10px; font-size: 12px; line-height: 1.9; opacity: 0.8; text-align: left;
  padding: 12px 14px; background: rgba(255,255,255,0.06); border-radius: 8px;
}
.install-guide b { color: #90cdf4; }
.installed-hide { display: none !important; }

.footer { margin-top: 40px; font-size: 11px; opacity: 0.3; text-align: center; }
</style>
</head>
<body>

<div class="logo">📋</div>
<h1>시대학원 조교관리</h1>
<div class="sub">조교일지 작성 · 급여관리 · 스프레드시트 연동</div>

<div class="cards">
  <a class="card" href="./journal.html">
    <div class="card-icon journal">📝</div>
    <div class="card-text">
      <h2>조교일지 작성기</h2>
      <p>수업별 업무·학생 상태·지각 기록<br>카톡 복사 + 시트 자동 제출</p>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="card" href="./salary.html">
    <div class="card-icon salary">💰</div>
    <div class="card-text">
      <h2>급여관리</h2>
      <p>시트 데이터 불러와 자동 계산<br>시급·세율 설정 · CSV 다운로드</p>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <a class="card" href="https://docs.google.com/spreadsheets/d/1J1RwxuGIKYG2CrOb-sJCJt5AVIKCmGJGFlkjuN1I-7M/edit" target="_blank">
    <div class="card-icon sheet">📊</div>
    <div class="card-text">
      <h2>스프레드시트 열기</h2>
      <p>조교일지 원본 데이터<br>급여정산 시트 직접 확인</p>
    </div>
    <div class="card-arrow">→</div>
  </a>
</div>

<!-- 앱 설치 안내 -->
<div class="install-banner" id="installBanner">
  <p>📲 홈 화면에 추가하면 앱처럼 사용할 수 있습니다!</p>
  <button class="install-btn" id="installBtn" onclick="installPWA()">홈 화면에 추가</button>
  <div class="install-guide" id="installGuide"></div>
</div>

<div class="footer">
  시대학원 AI입시연구소 · MacEduTech<br>
  v2.0 PWA
</div>

<script>
// Service Worker 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW failed:', err));
}

// 이미 설치된(standalone) 상태면 배너 숨기기
const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
  || window.navigator.standalone === true;
if (isStandalone) {
  document.getElementById('installBanner').classList.add('installed-hide');
}

// 기기 감지
const ua = navigator.userAgent;
const isIOS = /iPad|iPhone|iPod/.test(ua);
const isAndroid = /Android/.test(ua);
const isSamsung = /SamsungBrowser/.test(ua);
const isInApp = /KAKAOTALK|NAVER|Line|Instagram|FB_IAB|FBAN|Twitter|everytimeApp/i.test(ua);

// 인앱브라우저 감지 시 외부 브라우저 열기 안내
if (isInApp) {
  const banner = document.getElementById('installBanner');
  const guide = document.getElementById('installGuide');
  banner.innerHTML = 
    '<p style="font-size:14px;font-weight:700;margin-bottom:12px;">⚠️ 카카오톡 브라우저에서는 앱 설치가 안됩니다</p>' +
    '<p style="font-size:12px;opacity:0.8;margin-bottom:14px;">아래 버튼으로 Chrome/Safari에서 열어주세요!</p>' +
    '<button onclick="openExternal()" style="padding:12px 28px;border:none;border-radius:10px;background:#4299e1;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;">🌐 외부 브라우저로 열기</button>' +
    '<div style="margin-top:12px;font-size:11px;opacity:0.6;line-height:1.7;text-align:left;padding:10px 12px;background:rgba(255,255,255,0.06);border-radius:8px;">' +
    '또는 직접: 우측 상단 <b>⋮</b> → <b>"다른 브라우저로 열기"</b></div>';
}

// 외부 브라우저로 열기
function openExternal() {
  const currentUrl = window.location.href;
  if (isAndroid) {
    // Android: intent 스킴으로 Chrome 열기
    window.location.href = 'intent://' + currentUrl.replace(/https?:\/\//, '') + 
      '#Intent;scheme=https;package=com.android.chrome;end';
  } else if (isIOS) {
    // iOS: Safari로 열기
    window.location.href = currentUrl;
  } else {
    window.open(currentUrl, '_system');
  }
}

// PWA 자동 설치 프롬프트 (Android Chrome)
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'inline-block';
  document.getElementById('installGuide').innerHTML = 
    '👆 위 버튼을 누르면 바로 설치됩니다!';
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if (choice.outcome === 'accepted') {
        document.getElementById('installBanner').style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
}

window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').style.display = 'none';
});

// 기기별 수동 설치 안내 표시
function showManualGuide() {
  const guide = document.getElementById('installGuide');
  
  if (isIOS) {
    guide.innerHTML = 
      '📱 <b>iPhone / iPad 설치 방법</b><br>' +
      '① Safari 하단의 <b>공유 버튼</b> (□↑) 탭<br>' +
      '② 아래로 스크롤 → <b>"홈 화면에 추가"</b> 탭<br>' +
      '③ 우측 상단 <b>"추가"</b> 탭 → 완료!<br><br>' +
      '⚠️ 반드시 <b>Safari</b>에서 열어야 합니다.<br>' +
      '(카톡/네이버 등 인앱브라우저에서는 불가)';
  } else if (isAndroid && isSamsung) {
    guide.innerHTML = 
      '📱 <b>삼성 인터넷 설치 방법</b><br>' +
      '① 하단 <b>≡ 메뉴</b> 탭<br>' +
      '② <b>"현재 페이지 추가"</b> → <b>"홈 화면"</b> 선택<br>' +
      '③ 완료!<br><br>' +
      '💡 Chrome에서 열면 자동 설치 팝업이 뜹니다.';
  } else if (isAndroid) {
    guide.innerHTML = 
      '📱 <b>Android Chrome 설치 방법</b><br>' +
      '① 우측 상단 <b>⋮</b> (점 3개) 탭<br>' +
      '② <b>"홈 화면에 추가"</b> 또는 <b>"앱 설치"</b> 탭<br>' +
      '③ 완료!';
  } else {
    guide.innerHTML = 
      '💻 <b>PC 설치 방법</b><br>' +
      '① Chrome 주소창 오른쪽의 <b>설치 아이콘</b> (⊕) 클릭<br>' +
      '② 또는 주소창 오른쪽 <b>⋮</b> → <b>"앱 설치"</b><br>' +
      '③ 바탕화면에 앱 바로가기가 생성됩니다!';
  }
}

// 1초 후 beforeinstallprompt가 안 뜨면 수동 안내 표시
setTimeout(() => {
  if (!deferredPrompt && !isStandalone && !isInApp) {
    showManualGuide();
  }
}, 1000);
</script>
</body>
</html>
